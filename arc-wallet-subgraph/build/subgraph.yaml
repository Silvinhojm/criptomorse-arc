specVersion: 0.0.5
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: AgenticCommerce
    network: arc-testnet
    source:
      address: "0x0747EEf0706327138c69792bF28Cd525089e4583"
      abi: AgenticCommerce
      startBlock: 1
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Job
        - JobActivity
      abis:
        - name: AgenticCommerce
          file: AgenticCommerce\abis\AgenticCommerce.json
      eventHandlers:
        - event: JobCreated(indexed uint256,indexed address,indexed address,address,uint256,address)
          handler: handleJobCreated
        - event: JobFunded(indexed uint256,indexed address,uint256)
          handler: handleJobFunded
        - event: JobSubmitted(indexed uint256,indexed address,bytes32)
          handler: handleJobSubmitted
        - event: JobCompleted(indexed uint256,indexed address,bytes32)
          handler: handleJobCompleted
        - event: JobRejected(indexed uint256,indexed address,bytes32)
          handler: handleJobRejected
      file: AgenticCommerce\AgenticCommerce.wasm
